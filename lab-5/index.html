<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- style css -->
    <link href="css/style.css" rel="stylesheet" />

    <!-- Using Tristan Brown dependency -->
    <script src="js/tablesort/tablesort.min.js"></script>
    <link href="js/tablesort/css/tablesort.css" rel="stylesheet">
    <script src="js/tables.js" defer></script>
    <title>NHL standings - Atlantic</title>
</head>

<body>
    <!-- header -->
    <header>
        <h1>NHL standings</h1>
    </header>

    <!-- main -->
    <main>
        <!-- table element -->
        <table>
            <caption>Eastern Atlantic</caption>
            <!-- table header -->
            <thead>
                <th scope="col">Rank</th>
                <th scope="col">Team</th>
                <th scope="col">GP</th>
                <th scope="col">W</th>
                <th scope="col">L</th>
                <th scope="col">OT</th>
                <th scope="col">PTS</th>
                <th scope="col">P%</th>
                <th scope="col">GF</th>
                <th scope="col">GA</th>
            </thead>
            <tbody></tbody>
            <tfoot></tfoot>
        </table>
    </main>

    <!-- footer -->
    <footer>
        <h4>Reference: <em>https://www.nhl.com/standings/2026-04-02/division</em></h4>
    </footer>
</body>

</html>
